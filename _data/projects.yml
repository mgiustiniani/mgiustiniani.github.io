- slug: magrathea-oss
  name: "Magrathea OSS"
  eyebrow: "Three Magrathea backend projects"
  icon: "🌌"
  status: "MIT-licensed Java 21 / Spring Boot 4 Reactive project family"
  summary: "Magrathea is organized as three related projects: ObjectStore for S3-compatible storage, PKI for trust and certificate services, and KB for converting documents into a browsable and agent-accessible knowledge base. Each project is described with explicit bounded contexts, architecture documentation, and BDD scenarios where available."
  stack: ["Java 21", "Spring Boot 4", "WebFlux", "DDD", "BDD", "C4/ARC42"]
  software:
    - "Magrathea ObjectStore: an S3-compatible object-storage service with a public S3 API, an internal Admin API, and reactive application modules. Its storage-engine context covers policies, virtual devices, deduplication, erasure coding, replication, manifests, and filesystem backends."
    - "Magrathea PKI: a trust-services project for X.509, CVC, SSH, KMS, HSM/TPM custody and attestation profiles, policy enforcement, and audit concerns."
    - "Magrathea KB: a knowledge-base project that converts documents into structured content, publishes a Jekyll-based UI, exposes REST/MCP access, and can produce LLM Wiki / Obsidian-compatible output."
    - "Shared architecture material: C4 workspaces, ARC42 documentation, ADRs, and executable BDD scenarios where available."
  links:
    - label: "ObjectStore"
      url: "https://github.com/Magrathea-objectstorage/magrathea-objectstorage"
    - label: "PKI"
      url: "https://github.com/Magrathea-oss/magrathea-pki"
    - label: "Knowledge Base"
      url: "https://github.com/Magrathea-oss/magrathea-kb"
