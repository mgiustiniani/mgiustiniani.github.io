- slug: magrathea-oss
  name: "Magrathea OSS"
  eyebrow: "Storage, PKI, and knowledge-base modules"
  icon: "🌌"
  status: "MIT-licensed Java 21 / Spring Boot 4 Reactive project suite"
  summary: "A set of related backend projects built around bounded contexts and explicit architecture documentation. The current scope covers an S3-compatible object store, a storage engine, PKI/trust-management work, and a knowledge-base system for users and agents."
  stack: ["Java 21", "Spring Boot 4", "WebFlux", "DDD", "BDD", "C4/ARC42"]
  software:
    - "Magrathea ObjectStore: S3-compatible API surface, internal Admin API, and reactive application modules"
    - "Storage Engine: separate persistence bounded context with storage policies, virtual devices, deduplication, erasure coding, replication, manifests, and filesystem backends"
    - "Magrathea PKI: planned trust engine for X.509, CVC, SSH, KMS, HSM/TPM custody/attestation profiles, policy, and audit concerns"
    - "Magrathea KB: document conversion pipeline, Jekyll-based UI, REST/MCP access, and LLM Wiki/Obsidian-compatible output"
    - "Architecture material: C4 workspaces, ARC42 documentation, ADRs, and executable BDD scenarios where available"
  links:
